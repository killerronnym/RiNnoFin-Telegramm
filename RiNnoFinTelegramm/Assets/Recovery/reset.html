<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Passwort zurücksetzen - RinnoFin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            margin: 0 0 30px;
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        .success-state {
            display: none;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="glass-container" id="form-container">
        <div class="logo">🔑</div>
        <h1>Neues Passwort</h1>
        <p>Lege ein neues Passwort für deinen Account fest.</p>

        <form id="resetForm">
            <div class="input-group">
                <label for="password">Neues Passwort</label>
                <input type="password" id="password" placeholder="Mindestens 6 Zeichen" required autocomplete="new-password">
            </div>

            <div class="input-group" style="margin-bottom: 30px;">
                <label for="password_confirm">Passwort bestätigen</label>
                <input type="password" id="password_confirm" placeholder="Passwort wiederholen" required autocomplete="new-password">
            </div>

            <button type="submit" id="submitBtn">Passwort speichern</button>
            <div id="errorMsg" class="error-message"></div>
        </form>
    </div>

    <div class="glass-container success-state" id="success-container">
        <div class="success-icon">✅</div>
        <h1>Passwort geändert!</h1>
        <p>Dein neues Passwort wurde erfolgreich gespeichert. Du kannst dich jetzt damit einloggen.</p>
        <button onclick="window.location.href='/web/index.html'">Zum Login</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('errorMsg').innerText = "Ungültiger oder fehlender Reset-Link.";
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').style.opacity = '0.5';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            if (password !== passwordConfirm) {
                errorMsg.innerText = "Die Passwörter stimmen nicht überein.";
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.innerText = "Das Passwort muss mindestens 6 Zeichen lang sein.";
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            submitBtn.innerText = "Wird gespeichert...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/RiNnoFinConfig/ResetPassword', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ Token: token, NewPassword: password })
                });

                if (response.ok) {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-container').style.display = 'block';
                } else {
                    const data = await response.json();
                    throw new Error(data.message || "Fehler beim Zurücksetzen des Passworts.");
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
                submitBtn.innerText = "Passwort speichern";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
