<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Passwort vergessen - RinnoFin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            margin: 0 0 30px;
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
            margin-bottom: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
        
        .success-message {
            color: #22c55e;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            padding: 10px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .back-link {
            color: #94a3b8;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="glass-container" id="form-container">
        <div class="logo">🔒</div>
        <h1>Passwort vergessen?</h1>
        <p>Gib deine registrierte E-Mail-Adresse ein und wir senden dir einen Link zum Zurücksetzen deines Passworts.</p>

        <form id="forgotForm">
            <div class="input-group" style="margin-bottom: 25px;">
                <label for="email">E-Mail Adresse</label>
                <input type="email" id="email" placeholder="max@beispiel.de" required autocomplete="email">
            </div>

            <button type="submit" id="submitBtn">Link anfordern</button>
            <div id="errorMsg" class="error-message"></div>
            <div id="successMsg" class="success-message">Falls diese E-Mail bei uns registriert ist, erhältst du in Kürze einen Link zum Zurücksetzen.</div>
            
            <div style="margin-top: 20px;">
                <a href="/web/index.html" class="back-link">← Zurück zum Login</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            submitBtn.innerText = "Bitte warten...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/RiNnoFinConfig/RequestPasswordReset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ Email: email })
                });

                // For security reasons, we always show success even if email wasn't found
                successMsg.style.display = 'block';
                submitBtn.innerText = "Link gesendet";
                
                // Clear input
                document.getElementById('email').value = '';
            } catch (err) {
                errorMsg.innerText = "Ein unerwarteter Fehler ist aufgetreten.";
                errorMsg.style.display = 'block';
                submitBtn.innerText = "Link anfordern";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
