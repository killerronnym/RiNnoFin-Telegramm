<!DOCTYPE html>
<html class="layout-mobile" lang="de">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta content="Jellyfin" name="application-name">
    <meta content="noindex, nofollow, noarchive" name="robots">
    <title>Jellyfin - Account erstellen</title>
    <link href="/web/themes/dark/theme.css" rel="stylesheet" type="text/css"/>
    <link href="/sso/Telegram/login.css" rel="stylesheet" type="text/css"/>
    <link href="/web/favicon.ico" rel="icon" type="image/x-icon"/>
    <style id="cssBranding">
        /*{{CUSTOM_CSS}}*/
        .inputContainer { margin-bottom: 1.5em; text-align: left; }
        .inputLabel { display: block; margin-bottom: 0.5em; font-size: 1.1em; color: rgba(255, 255, 255, 0.7); }
        .inputLabelFocused { color: #00a4dc; }
        .emby-input { width: 100%; padding: 0.8em; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; color: #fff; font-size: 1.1em; }
        .emby-input:focus { border-color: #00a4dc; outline: none; }
        .success-state { display: none; text-align: center; }
        .success-state h1 { color: #00a4dc; margin-bottom: 1em; }
        .error-message { color: #cc3333; margin-top: 1em; display: none; font-size: 1.1em; }
    </style>
</head>
<body class="force-scroll hideMainDrawer">
<div class="backdropContainer"></div>
<div class="backgroundContainer"></div>

<div class="skinHeader skinHeader-blurred semiTransparent noHeaderRight">
    <div class="flex align-items-center flex-grow headerTop">
        <div class="headerLeft">
            <h3 class="pageTitle pageTitleWithLogo pageTitleWithDefaultLogo"></h3>
        </div>
    </div>
</div>

<div class="mainAnimatedPages skinBody">
    <div class="page standalonePage mainAnimatedPage rinnofin-page" data-role="page" data-type="login" id="loginPage">
        <div class="padded-left padded-right padded-bottom-page margin-auto-y">
            <div class="readOnlyContent">
                <div class="loginCard">
                    <div class="padded-left padded-right flex flex-direction-column align-items-center justify-content-center">
                        <div class="linkLogos flex flex-direction-row align-items-center justify-content-center" style="margin-bottom: 2em;">
                            <img src="/sso/Telegram/RiNnoFinLogo.png" alt="RiNnoFin Logo" class="brand-logo" />
                            <span class="material-symbols-outlined" style="margin: 0 20px; font-size: 2em;">person_add</span>
                            <svg aria-label="Jellyfin" role="img" style="height:3.8em;" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                                <rect fill="#ffffff" height="512" rx="15%" width="512"/>
                                <defs>
                                    <path d="M190.56 329.07c8.63 17.3 122.4 17.12 130.93 0 8.52-17.1-47.9-119.78-65.46-119.8-17.57 0-74.1 102.5-65.47 119.8z" id="A"/>
                                    <linearGradient gradientUnits="userSpaceOnUse" id="B" x1="126.15" x2="457.68" y1="219.32" y2="410.73">
                                        <stop offset="0%" stop-color="#aa5cc3"/>
                                        <stop offset="100%" stop-color="#00a4dc"/>
                                    </linearGradient>
                                    <path d="M58.75 417.03c25.97 52.15 368.86 51.55 394.55 0S308.93 56.08 256.03 56.08c-52.92 0-223.25 308.8-197.28 360.95zm68.04-45.25c-17.02-34.17 94.6-236.5 129.26-236.5 34.67 0 146.1 202.7 129.26 236.5-16.83 33.8-241.5 34.17-258.52 0z" id="C"/>
                                </defs>
                                <use fill="url(#B)" xlink:href="#A"/>
                                <use fill="url(#B)" xlink:href="#C"/>
                            </svg>
                        </div>
                        <h1 class="sectionTitle">Willkommen</h1>
                        <p class="subtitle" id="formSubtitle">Erstelle deinen persönlichen Account, um Filme und Serien zu streamen.</p>
                    </div>

                    <div class="spacedContent padded-left padded-right" id="form-container">
                        <form id="inviteForm">
                            <div class="inputContainer">
                                <label class="inputLabel" for="username">Benutzername</label>
                                <input class="emby-input" type="text" id="username" required autocomplete="username">
                            </div>
                            <div class="inputContainer">
                                <label class="inputLabel" for="email">E-Mail-Adresse</label>
                                <input class="emby-input" type="email" id="email" required autocomplete="email">
                            </div>
                            <div class="inputContainer">
                                <label class="inputLabel" for="password">Passwort</label>
                                <input class="emby-input" type="password" id="password" required autocomplete="new-password">
                                <div id="passwordStrength" style="margin-top: 5px; font-size: 0.9em; display: none;">
                                    Sicherheit: <span id="strengthText">Schwach</span>
                                    <div style="width: 100%; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; margin-top: 4px;">
                                        <div id="strengthBar" style="height: 100%; width: 0%; transition: width 0.3s, background-color 0.3s; border-radius: 2px;"></div>
                                    </div>
                                    <div style="font-size: 0.8em; color: rgba(255,255,255,0.6); margin-top: 4px;">
                                        Hinweis: Mindestens 8 Zeichen, inkl. Sonderzeichen (z.B. !)
                                    </div>
                                </div>
                            </div>
                            <div class="inputContainer" style="margin-bottom: 30px;">
                                <label class="inputLabel" for="password_confirm">Passwort wiederholen</label>
                                <input class="emby-input" type="password" id="password_confirm" required autocomplete="new-password">
                            </div>

                            <button class="raised submit emby-button block" id="submitBtn" is="emby-button" type="submit">
                                <span>Account erstellen</span>
                            </button>
                            <div id="errorMsg" class="error-message"></div>
                        </form>
                    </div>

                    <div class="spacedContent padded-left padded-right success-state" id="success-container">
                        <h1>Account erfolgreich erstellt!</h1>
                        <p style="font-size: 1.1em; margin-bottom: 2em; line-height: 1.5;">Dein Zugang wurde freigeschaltet. Du kannst dich jetzt in der App oder im Web einloggen.</p>
                        <button class="raised submit emby-button block" is="emby-button" onclick="window.location.replace('/web/index.html')" type="button">
                            <span>Jetzt einloggen</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        document.getElementById('errorMsg').innerText = "Ungültiger oder fehlender Einladungslink.";
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('submitBtn').disabled = true;
    }

    const inputs = document.querySelectorAll('.emby-input');
    inputs.forEach(input => {
        input.addEventListener('focus', (e) => {
            e.target.previousElementSibling.classList.add('inputLabelFocused');
        });
        input.addEventListener('blur', (e) => {
            e.target.previousElementSibling.classList.remove('inputLabelFocused');
        });
    });

    const passwordInput = document.getElementById('password');
    const strengthContainer = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('strengthText');
    const strengthBar = document.getElementById('strengthBar');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        if (val.length > 0) {
            strengthContainer.style.display = 'block';
        } else {
            strengthContainer.style.display = 'none';
        }

        let score = 0;
        if (val.length >= 8) score += 1;
        if (/[A-Z]/.test(val)) score += 1;
        if (/[0-9]/.test(val)) score += 1;
        if (/[^A-Za-z0-9]/.test(val)) score += 1; // Special char

        if (val.length < 8) score = 0; // Require at least 8 chars

        switch (score) {
            case 0:
            case 1:
                strengthText.innerText = 'Schwach';
                strengthText.style.color = '#cc3333';
                strengthBar.style.width = '25%';
                strengthBar.style.backgroundColor = '#cc3333';
                break;
            case 2:
                strengthText.innerText = 'Mittel';
                strengthText.style.color = '#e6b800';
                strengthBar.style.width = '50%';
                strengthBar.style.backgroundColor = '#e6b800';
                break;
            case 3:
                strengthText.innerText = 'Gut';
                strengthText.style.color = '#33cc33';
                strengthBar.style.width = '75%';
                strengthBar.style.backgroundColor = '#33cc33';
                break;
            case 4:
                strengthText.innerText = 'Sehr sicher';
                strengthText.style.color = '#00a4dc';
                strengthBar.style.width = '100%';
                strengthBar.style.backgroundColor = '#00a4dc';
                break;
        }
    });

    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password_confirm').value;
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        if (password !== passwordConfirm) {
            errorMsg.innerText = "Die Passwörter stimmen nicht überein.";
            errorMsg.style.display = 'block';
            return;
        }

        if (password.length < 8) {
            errorMsg.innerText = "Das Passwort muss mindestens 8 Zeichen lang sein.";
            errorMsg.style.display = 'block';
            return;
        }

        if (!/[^A-Za-z0-9]/.test(password)) {
            errorMsg.innerText = "Das Passwort muss mindestens ein Sonderzeichen (z.B. ! oder ?) enthalten.";
            errorMsg.style.display = 'block';
            return;
        }

        errorMsg.style.display = 'none';
        submitBtn.querySelector('span').innerText = "Bitte warten...";
        submitBtn.disabled = true;

        try {
            const response = await fetch('/api/RiNnoFinPublic/AcceptInvite', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ Token: token, Username: username, Email: email, Password: password })
            });

            if (response.ok) {
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('formSubtitle').style.display = 'none';
                document.getElementById('success-container').style.display = 'block';
            } else {
                let errorText = "Fehler bei der Erstellung des Accounts.";
                const text = await response.text();
                try {
                    const data = JSON.parse(text);
                    if(data.message) errorText = data.message;
                } catch(e) {
                    if(text) errorText = text;
                }
                throw new Error(`${errorText}`);
            }
        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
            submitBtn.querySelector('span').innerText = "Account erstellen";
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
