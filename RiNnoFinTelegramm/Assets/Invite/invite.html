<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>RiNnoFin - Account erstellen</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #050505;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass-card {
            background: rgba(25, 25, 35, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            max-height: 60px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: #9ca3af;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #d1d5db;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 4px;
            accent-color: #6366f1;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-group span {
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.5;
        }

        .checkbox-group a {
            color: #818cf8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .checkbox-group a:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #4b5563;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 20px;
            display: none;
        }

        /* Password Strength */
        .pwd-strength-container {
            margin-top: 8px;
            display: none;
        }
        .pwd-strength-text {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .pwd-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .pwd-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.4s ease;
        }

        /* Success State */
        .success-state {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 64px;
            color: #10b981;
            margin-bottom: 20px;
        }

        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0088cc 0%, #00a4dc 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.5);
        }

        .login-btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

<div class="glass-card" id="mainCard">
    <div class="header">
        <img src="/sso/Telegram/RiNnoFinLogo.png" onerror="this.src='https://raw.githubusercontent.com/jellyfin/jellyfin-ux/master/branding/logowhite.png'" alt="Logo" id="brandLogo">
        <h1 id="pageTitle">Willkommen</h1>
        <p id="pageSubtitle">Erstelle deinen Account für vollen Zugriff.</p>
    </div>

    <form id="inviteForm">
        <div class="input-group">
            <label for="username">Benutzername</label>
            <input type="text" id="username" placeholder="Dein gewünschter Name" required autocomplete="username">
        </div>

        <div class="input-group">
            <label for="email">E-Mail-Adresse</label>
            <input type="email" id="email" placeholder="name@beispiel.de" required autocomplete="email">
        </div>

        <div class="input-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" placeholder="Mindestens 8 Zeichen" required autocomplete="new-password">
            <div class="pwd-strength-container" id="pwdContainer">
                <div class="pwd-strength-text">
                    <span>Sicherheit</span>
                    <span id="pwdLabel">Schwach</span>
                </div>
                <div class="pwd-bar-bg">
                    <div class="pwd-bar-fill" id="pwdBar" style="background: #ef4444;"></div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label for="password_confirm">Passwort wiederholen</label>
            <input type="password" id="password_confirm" placeholder="Passwort bestätigen" required autocomplete="new-password">
        </div>

        <label class="checkbox-group">
            <input type="checkbox" id="tosAccepted" required>
            <span>Ich akzeptiere die <a href="#" onclick="alert('Nutzungsbedingungen: Dieser Service ist nur für eingeladene Mitglieder. Missbrauch führt zum Ausschluss.'); return false;">Nutzungsbedingungen</a>. *</span>
        </label>

        <label class="checkbox-group">
            <input type="checkbox" id="newsletterSubscribe">
            <span>Ich möchte den Newsletter erhalten, um über neue Filme und Serien informiert zu werden.</span>
        </label>

        <button type="submit" class="btn-submit" id="submitBtn">Account erstellen</button>

        <div class="error-message" id="errorMsg"></div>
    </form>

    <div class="success-state" id="successState">
        <span class="material-symbols-outlined success-icon">check_circle</span>
        <h1 style="font-size: 24px; font-weight: 600; margin-bottom: 10px;">Geschafft!</h1>
        <p style="color: #9ca3af; font-size: 14px; margin-bottom: 25px; line-height: 1.6;">Dein Account wurde erfolgreich erstellt. Du kannst sofort loslegen.</p>
        
        <a href="#" id="telegramBtn" class="telegram-btn" target="_blank" style="display: none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.701h-.002l.002.014-.314 4.692c.46 0 .663-.211.921-.46l2.211-2.15 4.599 3.397c.848.467 1.457.227 1.668-.785l3.019-14.228c.309-1.239-.473-1.8-1.282-1.447z" fill="currentColor"/>
            </svg>
            Mit Telegram verbinden
        </a>
        
        <a href="/web/index.html" class="login-btn">Zum Login</a>
    </div>
</div>

<script>
    // URL Check
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const paramUsername = urlParams.get('username');
    const paramEmail = urlParams.get('email');
    if (!token) {
        const err = document.getElementById('errorMsg');
        err.innerText = "Ungültiger oder fehlender Einladungslink.";
        err.style.display = 'block';
        document.getElementById('submitBtn').disabled = true;
    }
    
    if (paramUsername) {
        document.getElementById('username').value = paramUsername;
    }
    if (paramEmail) {
        document.getElementById('email').value = paramEmail;
    }

    // Password Strength
    const pwdInput = document.getElementById('password');
    const pwdContainer = document.getElementById('pwdContainer');
    const pwdBar = document.getElementById('pwdBar');
    const pwdLabel = document.getElementById('pwdLabel');

    pwdInput.addEventListener('input', () => {
        const val = pwdInput.value;
        if (val.length === 0) {
            pwdContainer.style.display = 'none';
            return;
        }
        pwdContainer.style.display = 'block';
        
        let strength = 0;
        if (val.length >= 8) strength += 25;
        if (val.length >= 12) strength += 25;
        if (/[A-Z]/.test(val)) strength += 20;
        if (/[0-9]/.test(val)) strength += 15;
        if (/[^A-Za-z0-9]/.test(val)) strength += 15;

        pwdBar.style.width = strength + '%';
        if (strength < 40) {
            pwdBar.style.background = '#ef4444'; // Red
            pwdLabel.innerText = 'Schwach';
            pwdLabel.style.color = '#ef4444';
        } else if (strength < 80) {
            pwdBar.style.background = '#f59e0b'; // Yellow
            pwdLabel.innerText = 'Mittel';
            pwdLabel.style.color = '#f59e0b';
        } else {
            pwdBar.style.background = '#10b981'; // Green
            pwdLabel.innerText = 'Stark';
            pwdLabel.style.color = '#10b981';
        }
    });

    // Submit Form
    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const pwd = document.getElementById('password').value;
        const pwdConf = document.getElementById('password_confirm').value;
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        if (pwd !== pwdConf) {
            errorMsg.innerText = 'Die Passwörter stimmen nicht überein!';
            errorMsg.style.display = 'block';
            return;
        }

        if (pwd.length < 8) {
            errorMsg.innerText = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
            errorMsg.style.display = 'block';
            return;
        }

        errorMsg.style.display = 'none';
        submitBtn.innerText = 'Bitte warten...';
        submitBtn.disabled = true;

        const payload = {
            Token: token,
            Username: document.getElementById('username').value,
            Email: document.getElementById('email').value,
            Password: pwd,
            SubscribeNewsletter: document.getElementById('newsletterSubscribe').checked
        };

        try {
            const response = await fetch('/api/RiNnoFinPublic/AcceptInvite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const result = await response.json();
                document.getElementById('inviteForm').style.display = 'none';
                document.getElementById('pageTitle').style.display = 'none';
                document.getElementById('pageSubtitle').style.display = 'none';
                
                document.getElementById('successState').style.display = 'block';
                
                if (result.botUsername && result.botUsername !== "INVALID_BOT_TOKEN") {
                    const btn = document.getElementById('telegramBtn');
                    btn.href = `https://t.me/${result.botUsername}?start=link`;
                    btn.style.display = 'inline-flex';
                }
            } else {
                const text = await response.text();
                let errMsg = "Fehler bei der Registrierung.";
                try {
                    const data = JSON.parse(text);
                    if(data.message) errMsg = data.message;
                } catch(err) {}
                throw new Error(errMsg);
            }
        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
            submitBtn.innerText = 'Account erstellen';
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
