<!DOCTYPE html>
<html class="layout-mobile" lang="de">
<head>
    <meta charset="utf-8" />
    <meta content="RiNnoFin Telegramm SSO" property="og:title"/>
    <meta content="RiNnoFin Telegramm SSO" property="og:site_name"/>
    <meta content="https://jellyfin.org" property="og:url"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta content="Jellyfin" name="application-name">
    <meta content="noindex, nofollow, noarchive" name="robots">
    <title>Jellyfin - RiNnoFin Telegramm SSO</title>
    <link href="/web/themes/dark/theme.css" rel="stylesheet" type="text/css"/>
    <link href="/sso/Telegram/login.css" rel="stylesheet" type="text/css"/>
    <link href="/web/favicon.ico" rel="icon" type="image/x-icon"/>
    <script src="/sso/Telegram/login.js"></script>
    <style id="cssBranding">
        /*{{CUSTOM_CSS}}*/
    </style>
</head>
<body class="force-scroll hideMainDrawer">
<div class="backdropContainer"></div>
<div class="backgroundContainer"></div>

<div class="skinHeader skinHeader-blurred semiTransparent noHeaderRight">
    <div class="flex align-items-center flex-grow headerTop">
        <div class="headerLeft">
            <h3 class="pageTitle pageTitleWithLogo pageTitleWithDefaultLogo"></h3>
        </div>
    </div>
</div>

<div class="mainAnimatedPages skinBody">
    <div class="page standalonePage mainAnimatedPage rinnofin-page" data-role="page" data-type="login" id="loginPage">
        <div class="padded-left padded-right padded-bottom-page margin-auto-y">
            <div class="readOnlyContent">
                <div class="loginCard">
                    <div class="padded-left padded-right flex flex-direction-column align-items-center justify-content-center">
                        <div class="linkLogos flex flex-direction-row align-items-center justify-content-center">
                            <img src="/sso/Telegram/RiNnoFinLogo.png" alt="RiNnoFin Logo" class="brand-logo" />
                            <span class="material-symbols-outlined animate-on-load animate-on-hover" id="ssoSyncIcon">
                                autorenew
                            </span>
                            <svg aria-label="Jellyfin" role="img" style="height:3.8em;" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                                <rect fill="#ffffff" height="512" rx="15%" width="512"/>
                                <defs>
                                    <path d="M190.56 329.07c8.63 17.3 122.4 17.12 130.93 0 8.52-17.1-47.9-119.78-65.46-119.8-17.57 0-74.1 102.5-65.47 119.8z" id="A"/>
                                    <linearGradient gradientUnits="userSpaceOnUse" id="B" x1="126.15" x2="457.68" y1="219.32" y2="410.73">
                                        <stop offset="0%" stop-color="#aa5cc3"/>
                                        <stop offset="100%" stop-color="#00a4dc"/>
                                    </linearGradient>
                                    <path d="M58.75 417.03c25.97 52.15 368.86 51.55 394.55 0S308.93 56.08 256.03 56.08c-52.92 0-223.25 308.8-197.28 360.95zm68.04-45.25c-17.02-34.17 94.6-236.5 129.26-236.5 34.67 0 146.1 202.7 129.26 236.5-16.83 33.8-241.5 34.17-258.52 0z" id="C"/>
                                </defs>
                                <use fill="url(#B)" xlink:href="#A"/>
                                <use fill="url(#B)" xlink:href="#C"/>
                            </svg>
                        </div>
                        <h1 class="sectionTitle">Telegram SSO</h1>
                        <p class="subtitle">Melde dich mit deinem Telegram-Account an, um fortzufahren.</p>
                    </div>

                    <div class="spacedContent padded-left padded-right flex align-items-center justify-content-center" id="errorMessage"></div>

                    <div class="telegramButton spacedContent">
                        <noscript>Bitte aktiviere JavaScript, um diese Seite zu nutzen.</noscript>
                        <script async data-onauth="onTelegramAuth(user)"
                                data-auth-url="{{SERVER_URL}}/sso/Telegram"
                                data-request-access="write"
                                data-size="large"
                                data-telegram-login="{{TELEGRAM_BOT_NAME}}"
                                data-userpic="true"
                                src="https://telegram.org/js/telegram-widget.js?22">
                        </script>
                    </div>

                    <div class="backButton spacedContent">
                        <button class="raised cancel btnQuick emby-button block" is="emby-button" onclick="window.location.replace('/web/index.html#!/login.html')" type="button">
                            <span class="material-symbols-outlined">key</span>
                            <span>Standard-Anmeldung verwenden</span>
                        </button>
                    </div>
                </div>

                <div class="provided-by">
                    RiNnoFin Telegramm-Verbindung
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
